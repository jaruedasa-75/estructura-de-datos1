<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" role="img" aria-labelledby="title desc">
  <title>UrbanStyle logo</title>
  <desc>Elegant circular emblem with the initials US and the UrbanStyle wordmark.</desc>
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8edd9"/>
      <stop offset="50%" stop-color="#caa26c"/>
      <stop offset="100%" stop-color="#6d4525"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff8ee"/>
      <stop offset="100%" stop-color="#8a623f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.87  0 1 0 0 0.74  0 0 1 0 0.48  0 0 0 0.55 0"/>
    </filter>
  </defs>

  <circle cx="225" cy="170" r="92" fill="url(#gold)" filter="url(#shadow)"/>
  <circle cx="225" cy="170" r="79" fill="none" stroke="url(#ring)" stroke-width="8"/>
  <circle cx="225" cy="170" r="63" fill="rgba(255,255,255,0.08)"/>
  <path d="M175 138c18-29 39-43 52-43 17 0 27 18 27 44 0 17-3 38-8 57" fill="none" stroke="#fff8ef" stroke-width="9" stroke-linecap="round"/>
  <path d="M266 140c0-27-10-42-26-42-18 0-37 18-51 47-8 15-16 38-16 59" fill="none" stroke="#fff8ef" stroke-width="9" stroke-linecap="round"/>
  <path d="M191 131l-13 60c-2 10 1 17 9 22 10 5 24 5 38-1" fill="none" stroke="#fff8ef" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M248 131c10 0 21 8 31 24 8 14 15 33 20 58" fill="none" stroke="#fff8ef" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M170 214c38 18 95 18 139 0" fill="none" stroke="#b27b3e" stroke-width="10" stroke-linecap="round" opacity="0.75"/>
  <ellipse cx="225" cy="262" rx="102" ry="18" fill="#d5ac70" filter="url(#softGlow)" opacity="0.35"/>

  <text x="225" y="198" text-anchor="middle" fill="#fffaf4" font-size="78" font-style="italic" font-weight="700" font-family="Segoe Script, Snell Roundhand, Brush Script MT, cursive">US</text>

  <text x="350" y="205" fill="#22252b" font-size="104" font-style="italic" font-weight="600" font-family="Segoe Script, Snell Roundhand, Brush Script MT, cursive" filter="url(#shadow)">Urban</text>
  <text x="670" y="205" fill="#9a6429" font-size="104" font-style="italic" font-weight="600" font-family="Segoe Script, Snell Roundhand, Brush Script MT, cursive" filter="url(#shadow)">Style</text>
</svg>